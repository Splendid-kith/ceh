<!DOCTYPE html>
<html>

<head>
    <title>CEH Student Login</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/refresh-handler.js"></script>
</head>

<body>

    <div class="container">
        <div class="card">

            <h1>CEH Student Entrance</h1>
            <form onsubmit="event.preventDefault(); startExam();">
                <label>Name</label>
                <input type="text" id="name" placeholder="Enter your full name" required>

                <label>Department</label>
                <input type="text" id="department" placeholder="Enter your department" required>

                <button type="submit">Start Exam</button>
            </form>
            <div style="margin-top: 15px; text-align: center;">
                <a href="/" style="color: #94a3b8; text-decoration: none;">&larr; Back to Home</a>
            </div>

        </div>
    </div>

    <script src="js/auth.js"></script>

</body>

</html>
