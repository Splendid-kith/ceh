<!DOCTYPE html>
<html>

<head>
    <title>CEH Admin Login</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/refresh-handler.js"></script>
</head>

<body>

    <div class="container">
        <div class="card" style="max-width: 400px; margin: 50px auto;">

            <h1>Admin Login</h1>
            <p style="text-align: center; color: #94a3b8; font-size: 14px; margin-bottom: 25px;">Please enter your credentials to access the dashboard.</p>

            <form id="loginForm" onsubmit="event.preventDefault(); loginAdmin();">
                <label>Username</label>
                <input type="text" id="adminUsername" placeholder="Enter admin username" required>

                <label>Password</label>
                <input type="password" id="adminPassword" placeholder="Enter admin password" required>

                <div id="errorMessage" style="color: #ef4444; margin-bottom: 15px; font-size: 14px; display: none;"></div>

                <button type="submit" style="width: 100%; height: 45px;">Login as Admin</button>
            </form>

            <div style="margin-top: 20px; text-align: center;">
                <a href="/" style="color: #94a3b8; text-decoration: none;">&larr; Back to Home</a>
            </div>

        </div>
    </div>

    <script src="js/admin-login.js"></script>

</body>

</html>
